<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <title>Three.js — mesh textures &amp; pencil post-processing</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #111; font-family: system-ui, sans-serif; }
    #c { display: block; width: 100%; height: 100%; }
    .ui {
      position: fixed;
      top: 6px;
      left: 6px;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 3px 8px;
      align-items: center;
      padding: 4px 8px;
      background: rgba(18, 20, 26, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 5px;
      color: #c8ccd4;
      font-size: 11px;
      line-height: 1.15;
      max-width: calc(100% - 12px);
    }
    .ui-field {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #8b93a2;
      white-space: nowrap;
    }
    .param-lock {
      cursor: pointer;
      user-select: none;
      border-bottom: 1px dotted transparent;
      color: #8b93a2;
    }
    .param-lock:hover { color: #b8c0d0; }
    .param-lock.locked {
      color: #d4a43a;
      border-bottom-color: rgba(212, 164, 58, 0.55);
    }
    select {
      background: #252a34;
      color: #e4e6eb;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 11px;
      cursor: pointer;
      max-width: 11rem;
    }
    input[type="checkbox"] {
      width: 12px;
      height: 12px;
      margin: 0;
      accent-color: #5a7ab0;
      cursor: pointer;
    }
    .light-panel {
      flex-basis: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 3px 10px;
      align-items: flex-end;
      padding-top: 3px;
      margin-top: 1px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }
    .light-field {
      display: flex;
      flex-direction: column;
      gap: 0;
      font-size: 9px;
      letter-spacing: 0.02em;
      color: #7a8290;
      min-width: 0;
      text-transform: uppercase;
    }
    .light-field .param-lock { font-size: 9px; }
    .light-panel input[type="range"] {
      width: 88px;
      max-width: 22vw;
      height: 12px;
      margin: 0;
    }
    .shape-search-trigger {
      padding: 0 2px;
      margin: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      opacity: 0.85;
      border-radius: 3px;
    }
    .shape-search-trigger:hover { opacity: 1; background: rgba(255, 255, 255, 0.08); }
    .shape-search-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 12vh 16px 16px;
      pointer-events: none;
    }
    .shape-search-modal[hidden] { display: none !important; }
    .shape-search-modal:not([hidden]) { pointer-events: auto; }
    .shape-search-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      cursor: pointer;
    }
    .shape-search-dialog {
      position: relative;
      width: min(420px, 100%);
      max-height: min(72vh, 520px);
      display: flex;
      flex-direction: column;
      background: #1e222c;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      color: #e4e6eb;
      font-size: 13px;
    }
    .shape-search-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .shape-search-head h2 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      color: #c8ccd4;
    }
    .shape-search-close {
      padding: 2px 8px;
      border: none;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.08);
      color: #c8ccd4;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }
    .shape-search-close:hover { background: rgba(255, 255, 255, 0.14); }
    #shapeSearchInput {
      margin: 10px 12px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      background: #252a34;
      color: #e4e6eb;
      font-size: 14px;
      outline: none;
    }
    #shapeSearchInput:focus { border-color: #5a7ab0; }
    .shape-search-list {
      overflow-y: auto;
      flex: 1;
      padding: 0 8px 10px;
      min-height: 120px;
    }
    .shape-search-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      text-align: left;
      padding: 8px 10px;
      margin: 2px 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #e4e6eb;
      font-size: 13px;
      cursor: pointer;
    }
    .shape-search-row:hover, .shape-search-row:focus {
      background: rgba(90, 122, 176, 0.25);
      outline: none;
    }
    .shape-search-row-text { flex: 1; min-width: 0; }
    .shape-search-row-group {
      font-size: 10px;
      color: #7a8290;
      white-space: nowrap;
      max-width: 45%;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .shape-search-empty {
      padding: 24px 12px;
      text-align: center;
      color: #7a8290;
      font-size: 13px;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="ui" title="C: log to console · Space: randomize unlocked controls · Click a parameter name to lock/unlock">
    <div class="ui-field" title="Mesh albedo / pattern">
      <span class="param-lock" data-lock="texture" tabindex="0" role="button" title="Click: lock/unlock for Space randomize">Texture</span>
      <select id="texture" aria-label="Texture">
        <option value="solid">Standard (solid color, no map)</option>
        <option value="checker">Checker</option>
        <option value="noise">Noise / grain</option>
        <option value="stripes" selected>Diagonal stripes</option>
        <option value="dots">Stipple dots</option>
        <option value="wood">Wood-like lines</option>
        <option value="longWavy">Long wavy (smooth)</option>
        <option value="discreteWavy">Discrete wavy (bands)</option>
        <option value="bubbly">Bubbly</option>
        <option value="stain">Stain / blotches</option>
        <option value="weave">Cross-weave</option>
      </select>
    </div>
    <div class="ui-field" title="Ground plane (circle under the mesh)">
      <span class="param-lock" data-lock="groundTexture" tabindex="0" role="button" title="Click: lock/unlock for Space randomize">Table</span>
      <select id="groundTexture" aria-label="Table texture">
        <option value="solid">Standard (solid color, no map)</option>
        <option value="checker">Checker</option>
        <option value="noise">Noise / grain</option>
        <option value="stripes" selected>Diagonal stripes</option>
        <option value="dots">Stipple dots</option>
        <option value="wood">Wood-like lines</option>
        <option value="longWavy">Long wavy (smooth)</option>
        <option value="discreteWavy">Discrete wavy (bands)</option>
        <option value="bubbly">Bubbly</option>
        <option value="stain">Stain / blotches</option>
        <option value="weave">Cross-weave</option>
      </select>
    </div>
    <div class="ui-field">
      <span class="param-lock" data-lock="effect" tabindex="0" role="button" title="Click: lock/unlock for Space randomize">Effect</span>
      <select id="effect" aria-label="Effect">
        <option value="pencil" selected>Pencil sketch (post-process)</option>
        <option value="standard">Standard lit (no post)</option>
      </select>
    </div>
    <div class="ui-field" title="Mesh geometry: procedural or Kenney OBJ (pirate, car, food) under models/kenney-*">
      <span class="param-lock" data-lock="mesh" tabindex="0" role="button" title="Click: lock/unlock for Space randomize">Mesh</span>
      <button type="button" class="shape-search-trigger" id="shapeSearchOpen" title="Search mesh" aria-label="Search mesh" aria-expanded="false" aria-haspopup="dialog">🔍</button>
      <select id="shape" aria-label="Mesh">
        <optgroup label="Procedural">
          <option value="bottle" selected>Water bottle</option>
          <option value="torusKnot">Torus knot</option>
          <option value="box">Box</option>
          <option value="cylinder">Cylinder</option>
          <option value="cone">Cone</option>
          <option value="pyramid">Square pyramid (4 sides)</option>
          <option value="hexPrism">Hexagonal prism</option>
          <option value="octahedron">Octahedron</option>
          <option value="tetrahedron">Tetrahedron</option>
          <option value="dodecahedron">Dodecahedron</option>
          <option value="torus">Torus (donut)</option>
          <option value="capsule">Capsule</option>
          <option value="icosahedron">Icosahedron</option>
        </optgroup>
        <optgroup label="Kenney Pirate Kit (CC0 · OBJ)">
          <option value="kenney-bottle">Bottle</option>
          <option value="kenney-bottle-large">Bottle (large)</option>
          <option value="kenney-chest">Chest</option>
          <option value="kenney-crate">Crate</option>
          <option value="kenney-cannon">Cannon</option>
          <option value="kenney-cannon-ball">Cannon ball</option>
          <option value="kenney-ship-small">Ship (small)</option>
          <option value="kenney-ship-pirate-small">Pirate ship (small)</option>
          <option value="kenney-boat-row-small">Rowboat (small)</option>
          <option value="kenney-rocks-a">Rocks A</option>
          <option value="kenney-tool-shovel">Shovel</option>
          <option value="kenney-palm-straight">Palm tree</option>
          <option value="kenney-flag-pirate">Pirate flag</option>
          <option value="kenney-tower-complete-small">Tower (small)</option>
        </optgroup>
        <optgroup label="Kenney Car Kit (CC0 · OBJ)">
          <option value="car-sedan">Sedan</option>
          <option value="car-sedan-sports">Sedan (sports)</option>
          <option value="car-hatchback-sports">Hatchback (sports)</option>
          <option value="car-suv">SUV</option>
          <option value="car-suv-luxury">SUV (luxury)</option>
          <option value="car-taxi">Taxi</option>
          <option value="car-police">Police car</option>
          <option value="car-ambulance">Ambulance</option>
          <option value="car-firetruck">Fire truck</option>
          <option value="car-van">Van</option>
          <option value="car-truck">Truck</option>
          <option value="car-truck-flat">Truck (flatbed)</option>
          <option value="car-garbage-truck">Garbage truck</option>
          <option value="car-delivery">Delivery van</option>
          <option value="car-delivery-flat">Delivery (flat)</option>
          <option value="car-tractor">Tractor</option>
          <option value="car-tractor-shovel">Tractor + shovel</option>
          <option value="car-tractor-police">Tractor (police)</option>
          <option value="car-race">Race car</option>
          <option value="car-race-future">Race car (future)</option>
          <option value="car-kart">Kart</option>
          <option value="car-wheel-racing">Wheel (racing)</option>
          <option value="car-cone">Traffic cone</option>
          <option value="car-traffic-box">Traffic barrier box</option>
          <option value="car-debris-tire">Debris: tire</option>
        </optgroup>
        <optgroup label="Kenney Food Kit (CC0 · OBJ)">
          <option value="food-apple">Apple</option>
          <option value="food-banana">Banana</option>
          <option value="food-avocado">Avocado</option>
          <option value="food-burger">Burger</option>
          <option value="food-burger-double">Burger (double)</option>
          <option value="food-hot-dog">Hot dog</option>
          <option value="food-fries">Fries</option>
          <option value="food-pizza">Pizza</option>
          <option value="food-donut">Donut</option>
          <option value="food-donut-sprinkles">Donut (sprinkles)</option>
          <option value="food-cake-birthday">Birthday cake</option>
          <option value="food-cupcake">Cupcake</option>
          <option value="food-cookie">Cookie</option>
          <option value="food-croissant">Croissant</option>
          <option value="food-bread">Bread</option>
          <option value="food-cheese">Cheese</option>
          <option value="food-egg">Egg</option>
          <option value="food-sushi-salmon">Sushi (salmon)</option>
          <option value="food-sushi-egg">Sushi (egg)</option>
          <option value="food-taco">Taco</option>
          <option value="food-watermelon">Watermelon</option>
          <option value="food-strawberry">Strawberry</option>
          <option value="food-sandwich">Sandwich</option>
          <option value="food-sub">Sub sandwich</option>
          <option value="food-salad">Salad</option>
          <option value="food-sundae">Sundae</option>
          <option value="food-waffle">Waffle</option>
          <option value="food-pancakes">Pancakes</option>
          <option value="food-ice-cream">Ice cream</option>
          <option value="food-soda-can">Soda can</option>
          <option value="food-wine-red">Wine (red)</option>
          <option value="food-cup-coffee">Coffee cup</option>
          <option value="food-turkey">Turkey</option>
          <option value="food-bacon">Bacon</option>
          <option value="food-fish">Fish</option>
          <option value="food-plate-dinner">Dinner plate</option>
          <option value="food-bowl-soup">Soup bowl</option>
          <option value="food-carrot">Carrot</option>
          <option value="food-broccoli">Broccoli</option>
          <option value="food-chinese">Takeout box</option>
          <option value="food-dim-sum">Dim sum</option>
          <option value="food-rolling-pin">Rolling pin</option>
        </optgroup>
      </select>
    </div>
    <div class="ui-field">
      <span class="param-lock" data-lock="spin" tabindex="0" role="button" title="Click: lock/unlock for Space randomize">Spin</span>
      <input type="checkbox" id="autoRotate" title="Slow Y spin" aria-label="Auto rotate mesh" />
    </div>
    <div class="light-panel" title="Lift dark sides for clearer texture">
      <div class="light-field" title="Hemisphere sky + ground">
        <span class="param-lock" data-lock="hemi" tabindex="0" role="button" title="Click: lock/unlock for Space randomize">Hemi</span>
        <input type="range" id="hemiIntensity" min="0" max="1.6" step="0.05" value="1.6" aria-label="Hemisphere intensity" />
      </div>
      <div class="light-field" title="Main directional">
        <span class="param-lock" data-lock="key" tabindex="0" role="button" title="Click: lock/unlock for Space randomize">Key</span>
        <input type="range" id="dirIntensity" min="0.15" max="2.2" step="0.05" value="2.2" aria-label="Key light intensity" />
      </div>
      <div class="light-field" title="Fill from opposite side">
        <span class="param-lock" data-lock="fill" tabindex="0" role="button" title="Click: lock/unlock for Space randomize">Fill</span>
        <input type="range" id="fillIntensity" min="0" max="0.85" step="0.02" value="0" aria-label="Fill light intensity" />
      </div>
      <div class="light-field" title="Mesh only — higher = softer specular">
        <span class="param-lock" data-lock="rough" tabindex="0" role="button" title="Click: lock/unlock for Space randomize">Rough</span>
        <input type="range" id="roughness" min="0.12" max="1" step="0.02" value="1" aria-label="Surface roughness" />
      </div>
    </div>
  </div>
  <div id="shapeSearchModal" class="shape-search-modal" hidden aria-hidden="true">
    <div class="shape-search-backdrop" id="shapeSearchBackdrop" aria-hidden="true"></div>
    <div class="shape-search-dialog" role="dialog" aria-modal="true" aria-labelledby="shapeSearchTitle" tabindex="-1">
      <div class="shape-search-head">
        <h2 id="shapeSearchTitle">Search mesh</h2>
        <button type="button" class="shape-search-close" id="shapeSearchClose" aria-label="Close mesh search">×</button>
      </div>
      <input type="search" id="shapeSearchInput" placeholder="Search mesh…" autocomplete="off" enterkeyhint="search" />
      <div id="shapeSearchList" class="shape-search-list"></div>
    </div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
